<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TodaysDental Credentialing</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div id="app" class="popup-container">
    <!-- Loading State -->
    <div id="loading-state" class="state-view">
      <div class="loading-spinner"></div>
      <p>Loading...</p>
    </div>

    <!-- Login State - Email Entry -->
    <div id="login-state" class="state-view hidden">
      <div class="popup-header">
        <div class="logo">
          <img src="../icons/todaysdental-logo.png" alt="TodaysDental" class="logo-image">
        </div>
        <h1>TodaysDental</h1>
        <p class="subtitle">Credentialing Autofill</p>
      </div>

      <form id="login-form" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@todaysdental.com" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="request-otp-btn">
          <span>Send Verification Code</span>
        </button>
        <p class="login-help">We'll send a 6-digit code to your email</p>
      </form>
    </div>

    <!-- OTP Verification State -->
    <div id="otp-state" class="state-view hidden">
      <div class="popup-header">
        <div class="logo">
          <img src="../icons/todaysdental-logo.png" alt="TodaysDental" class="logo-image">
        </div>
        <h1>Verify Code</h1>
        <p class="subtitle" id="otp-email-display">Code sent to your email</p>
      </div>

      <form id="otp-form" class="login-form">
        <div class="form-group">
          <label for="otp-code">6-Digit Code</label>
          <input type="text" id="otp-code" placeholder="000000" maxlength="6" pattern="[0-9]{6}" required
            autocomplete="one-time-code" inputmode="numeric">
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="verify-otp-btn">
          <span>Verify & Sign In</span>
        </button>
        <div class="otp-actions">
          <button type="button" class="link-btn" id="resend-otp-btn">Resend Code</button>
          <button type="button" class="link-btn" id="change-email-btn">Change Email</button>
        </div>
        <p class="otp-timer" id="otp-timer"></p>
      </form>
    </div>

    <!-- Main State (Logged In) -->
    <div id="main-state" class="state-view hidden">
      <div class="popup-header compact">
        <div class="user-info">
          <span class="user-avatar" id="user-avatar">TD</span>
          <span class="user-email" id="user-email">user@example.com</span>
        </div>
        <button class="btn-icon" id="logout-btn" title="Logout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>

      <!-- Provider Selection -->
      <div class="section">
        <label class="section-label">Select Provider</label>
        <div class="search-filter-row">
          <div class="search-container">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </svg>
            <input type="text" id="provider-search" placeholder="Search providers..." class="search-input">
          </div>
          <select id="clinic-filter" class="state-filter" title="Filter by clinic">
            <option value="">All Clinics</option>
          </select>
        </div>
        <div id="state-summary" class="state-summary hidden"></div>
        <div id="provider-list" class="provider-list">
          <div class="provider-list-empty">Type to search providers...</div>
        </div>
        <div id="selected-provider" class="selected-provider hidden">
          <div class="provider-card selected">
            <div class="provider-info">
              <span class="provider-name" id="selected-name">Dr. John Doe</span>
              <span class="provider-detail-row">
                <span class="provider-npi" id="selected-npi">NPI: 1234567890</span>
              </span>
            </div>
            <button class="btn-icon" id="clear-provider" title="Clear selection">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Portal Status -->
      <div class="section">
        <label class="section-label">Current Page</label>
        <div id="portal-status" class="portal-status">
          <div class="portal-info">
            <span class="portal-icon portal-unknown">?</span>
            <div class="portal-details">
              <span class="portal-name" id="portal-name">No portal detected</span>
              <span class="portal-url" id="portal-url">Navigate to an insurance portal</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="section actions">
        <button class="btn btn-primary btn-full" id="trigger-autofill" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 11l3 3L22 4"></path>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
          </svg>
          Open Autofill Panel
        </button>
        <button class="btn btn-secondary btn-full" id="rescan-page" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"></path>
          </svg>
          Re-scan Page
        </button>
      </div>

      <!-- Settings Link -->
      <div class="footer">
        <button class="link-btn" id="open-settings">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M12 1v2m0 18v2m-9-11h2m18 0h2m-4.22-5.78 1.42-1.42m-15.56 0 1.42 1.42m0 11.32-1.42 1.42m15.56 0-1.42-1.42">
            </path>
          </svg>
          Settings
        </button>
      </div>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>

</html>
